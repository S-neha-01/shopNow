# ============================================================
# ShopNow Helm Chart — Default Values
# Override with: helm install shopnow ./helm/shopnow -f my-values.yaml
# ============================================================

# Global settings shared across all components
global:
  namespace: shopnow
  imageRegistry: ""      # e.g. "docker.io/myorg" — prefix added to all images
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []   # - name: regcred

# ------------------------------------------------------------
# MongoDB
# ------------------------------------------------------------
mongodb:
  enabled: true
  image:
    repository: mongo
    tag: "6.0"
  replicas: 1
  auth:
    rootUsername: root
    rootPassword: rootpassword   # CHANGE in production — use --set or external secret
    database: shopnow
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""   # "" = cluster default (standard on minikube)
    accessMode: ReadWriteOnce
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# ------------------------------------------------------------
# Backend (Express.js / Node.js)
# ------------------------------------------------------------
backend:
  enabled: true
  image:
    repository: shopnow/backend
    tag: "latest"
  replicas: 2
  port: 5000
  nodePort: 30500
  nodeEnv: production
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# ------------------------------------------------------------
# Frontend (React + Nginx)
# ------------------------------------------------------------
frontend:
  enabled: true
  image:
    repository: shopnow/frontend
    tag: "latest"
  replicas: 2
  port: 80
  nodePort: 30080
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 80

# ------------------------------------------------------------
# Admin Dashboard (React + Nginx)
# ------------------------------------------------------------
admin:
  enabled: true
  image:
    repository: shopnow/admin
    tag: "latest"
  replicas: 1
  port: 80
  nodePort: 30081
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

# ------------------------------------------------------------
# Ingress
# ------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "90"
  host: ""   # Leave empty for minikube IP-based access; set to "shopnow.local" for hostname routing
  tls:
    enabled: false
    secretName: shopnow-tls
