apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: shopnow
  labels:
    app: admin
    app.kubernetes.io/part-of: shopnow
spec:
  type: NodePort
  selector:
    app: admin
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30081   # Access via: $(minikube ip):30081
      protocol: TCP
