apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: shopnow
  labels:
    app: backend
    app.kubernetes.io/part-of: shopnow
data:
  PORT: "5000"
  NODE_ENV: "production"
  # CORS origins allowed - frontend and admin services
  CORS_ORIGINS: "http://frontend-service,http://admin-service"
